version: "3.9"

# ─── Shared defaults ──────────────────────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://clipuser:clippass@postgres:5432/clipdb}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
  MINIO_BUCKET: ${MINIO_BUCKET:-ai-clip}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
  WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clipuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clippass}
      POSTGRES_DB: ${POSTGRES_DB:-clipdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clipuser} -d ${POSTGRES_DB:-clipdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── MinIO bucket init ───────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123};
        mc mb --ignore-existing local/${MINIO_BUCKET:-ai-clip};
        mc anonymous set download local/${MINIO_BUCKET:-ai-clip}/outputs;
        echo 'MinIO bucket ready';
      "

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app          # hot-reload in dev; remove in prod
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-2}
        --queues=clip
    env_file:
      - .env
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── Frontend (Vite dev) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend/src:/app/src   # hot-reload for src only
      - /app/node_modules          # anonymous volume — keep container's node_modules
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx (reverse proxy, prod-ready) ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - prod   # only started in: docker compose --profile prod up

volumes:
  postgres_data:
  redis_data:
  minio_data:
